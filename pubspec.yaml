name: streamflix
description: OTT Streaming Platform - Stream Anything. Anywhere.
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.6.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.5
  bloc: ^8.1.4
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.2.0

  # Network
  dio: ^5.5.0
  pretty_dio_logger: ^1.3.1

  # Local Storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.1

  # Video Player
  media_kit: ^1.1.11
  media_kit_video: ^1.2.4
  media_kit_libs_video: ^1.0.5
  youtube_player_flutter: ^9.0.2
  flutter_inappwebview: ^6.0.0

  # Image & Media
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2
  photo_view: ^0.15.0

  # UI
  shimmer: ^3.0.0
  lottie: ^3.1.2
  flutter_svg: ^2.0.10
  google_fonts: ^6.2.1
  flex_color_scheme: ^7.3.1
  smooth_page_indicator: ^1.2.0
  carousel_slider: ^5.0.0
  flutter_staggered_grid_view: ^0.7.0
  badges: ^3.1.2
  percent_indicator: ^4.2.3
  fl_chart: ^0.68.0
  syncfusion_flutter_charts: ^33.2.13

  # Auth & Social
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.2
  flutter_facebook_auth: ^7.0.1

  # Payments
  razorpay_flutter: ^1.3.7
  in_app_purchase: ^3.2.0

  # Firebase
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0
  firebase_analytics: ^11.3.0
  firebase_crashlytics: ^4.1.0

  # Notifications
  flutter_local_notifications: ^17.2.2

  # Deep Links
  app_links: ^6.3.2

  # Cast — removed: flutter_cast_framework only has a 3-year-old 0.0.1-alpha.1 on pub.dev
  # (the ^0.4.2 listed here never existed) and it isn't referenced anywhere in lib/.
  # Re-add a maintained casting package (e.g. google_cast) if/when Chromecast is built.

  # Download
  flutter_downloader: ^1.11.8
  path_provider: ^2.1.3
  permission_handler: ^11.3.1

  # Utils
  intl: ^0.20.2
  timeago: ^3.7.0
  url_launcher: ^6.3.0
  share_plus: ^10.0.0
  connectivity_plus: ^6.0.3
  device_info_plus: ^10.1.0
  package_info_plus: ^8.1.1
  uuid: ^4.4.2
  crypto: ^3.0.3
  encrypt: ^5.0.3
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Dependency injection
  get_it: ^8.0.3

  # Video playback (web + mobile)
  video_player: ^2.9.2
  web: ^1.1.0   # used by hls_web.dart for HLS playback on web
  dartz: ^0.10.1
  logger: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^3.0.0
  json_serializable: ^6.9.0
  # retrofit_generator & hive_generator removed: retrofit isn't used (raw Dio) and there
  # are no @HiveType adapters. Both pulled analyzer 6 -> the removed _macros pkg (Dart 3.11).
  mockito: ^5.4.4
  bloc_test: ^9.1.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/
  # Poppins font is loaded at runtime via the google_fonts package (no bundled .ttf needed).
  # Re-add a `fonts:` section here only if you drop real .ttf files into assets/fonts/.
